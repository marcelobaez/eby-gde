services:
  backend:
    container_name: eby-exp-backend
    build:
      context: ./backend
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
    env_file:
      - .env
    volumes:
      - ./backend/config:/srv/backend/config
      - ./backend/src:/srv/backend/src
      - ./backend/package.json:/srv/backend/package.json
      - ./backend/pnpm-lock.yaml:/opt/pnpm-lock.yaml

      - ./backend/.env:/srv/backend/.env
      - ./backend/public/uploads:/srv/backend/public/uploads
    restart: always
    ports:
      - "1337:1337"

  frontend:
    container_name: eby-exp-frontend
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
    env_file:
      - .env
    restart: always
    environment:
      PORT: 3000
      HOSTNAME: "0.0.0.0"
    ports:
      - "3000:3000"
    # Allow Next.js to gracefully shutdown and complete after() callbacks
    stop_grace_period: 30s
    stop_signal: SIGTERM
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  nginx:
    container_name: eby-exp-nginx
    build:
      context: ./nginx
    environment:
      - BACKEND_SERVER_NAME=${BACKEND_SERVER_NAME}
      - FRONTEND_SERVER_NAME=${FRONTEND_SERVER_NAME}
    ports:
      - 8080:80
      - 443:443
    depends_on:
      - frontend
      - backend
    volumes:
      - ./certs:/etc/nginx/certs
