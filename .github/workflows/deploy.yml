name: Deploy to Production

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Deploy to Ubuntu Server
    runs-on: self-hosted
    
    defaults:
      run:
        working-directory: /home/sistemas/desarrollos/eby-gde
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for rollback
      
      - name: Validate environment variables
        run: bash scripts/validate-env.sh
      
      - name: Deploy with rollback capability
        run: bash scripts/deploy.sh
      
      - name: Deployment Success Summary
        if: success()
        run: |
          echo "## ✅ Deployment Successful!" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Timestamp:** $(date)" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "**Branch:** ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "All services are healthy and running." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**View logs:** \`tail -f /var/log/eby-gde/deployment-*.log\`" >> $GITHUB_STEP_SUMMARY
      
      - name: Deployment Failure Summary
        if: failure()
        run: |
          echo "## ❌ Deployment Failed" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Timestamp:** $(date)" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "**Branch:** ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "The deployment encountered errors and may have been rolled back." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Check logs:** \`tail -f /var/log/eby-gde/deployment-*.log\`" >> $GITHUB_STEP_SUMMARY
          echo "**Troubleshooting:** See docs/DEPLOYMENT.md" >> $GITHUB_STEP_SUMMARY
